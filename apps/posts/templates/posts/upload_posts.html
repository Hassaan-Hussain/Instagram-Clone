{% load crispy_forms_tags %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create New Post</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-gray-50 dark:bg-gray-900">

    <!-- Modal Overlay -->
    <div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        
        <!-- Modal Container -->
        <div class="bg-white dark:bg-gray-500 rounded-lg w-full max-w-2xl mx-4 shadow-xl">
            
            <!-- Modal Header -->
            <div class="flex items-center justify-between px-6 py-4 border-b border-gray-200 dark:border-gray-700">
                <div class="flex items-center space-x-4">
                    <h2 class="text-xl font-semibold text-gray-900 dark:text-white">Create new post</h2>
                </div>
                <div class="flex items-center space-x-3">
                    <button class="text-purple-600 font-semibold text-sm hover:text-purple-700">Share</button>
                    <button class="text-gray-400 hover:text-gray-500 dark:hover:text-gray-300">
                        <i class="fas fa-times text-xl"></i>
                    </button>
                </div>
            </div>

            <!-- Modal Body -->
            <div class="p-6">
                <form action="" method='post' class='text-white' enctype='multipart/form-data'>
                    {% csrf_token %}
                    {{form | crispy}}
                    <button class="px-4 py-2 bg-purple-600 text-white rounded-lg text-sm font-medium hover:bg-purple-700 transition-colors" type='submit'>
                    Create
                    </button>
                </form>
            </div>
                
                <!-- Navigation Buttons -->
                
            </div>
        </div>
    </div>
</body>
</html>
